[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "binding_analysis"
version = "0.1.0"
description = "Tools for metabolite-protein residence time analysis"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "lmfit",
    "MDAnalysis",
    "tqdm",
    "scipy",
    "freud-analysis"
]

[project.scripts]
contact-analysis = "cli:main"
binding-analysis = "cli_contacts:main"

[tool.setuptools.packages.find]
where = ["src"]
